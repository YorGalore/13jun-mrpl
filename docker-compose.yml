services:
  virtuoso:
    image: openlink/virtuoso-opensource-7:latest
    container_name: virtuoso
    ports:
      - "8890:8890"
      - "1111:1111"
    environment:
      DBA_PASSWORD: dba
      SPARQL_UPDATE: "true"
      DEFAULT_GRAPH: "http://sepses.local"
    volumes:
      - ./virtuoso-data:/database
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8890/sparql?query=ASK%20%7B%7D || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  virtuoso-data:
    driver: local